<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search Preview</title>
    <style>
        body {
            font-family: arial, sans-serif;
            padding: 40px;
            background-color: #fff;
            color: #4d5156;
        }

        .result-container {
            max-width: 650px;
        }

        .site-info {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .icon {
            width: 28px;
            height: 28px;
            background-color: #f1f3f4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .icon img {
            width: 16px;
            height: 16px;
        }

        .site-name-url {
            display: flex;
            flex-direction: column;
        }

        .site-name {
            font-size: 14px;
            color: #202124;
            text-decoration: none;
            line-height: 1.3;
        }

        .site-name:hover {
            text-decoration: underline;
        }

        .url {
            font-size: 12px;
            color: #4d5156;
            line-height: 1.3;
        }

        .title {
            font-size: 20px;
            color: #1a0dab;
            text-decoration: none;
            line-height: 1.3;
            margin-bottom: 3px;
            display: block;
        }

        .title:hover {
            text-decoration: underline;
        }

        .description {
            font-size: 14px;
            color: #4d5156;
            line-height: 1.58;
            word-wrap: break-word;
        }

        .snippet-keyword {
            font-weight: bold;
            color: #4d5156;
        }

        .options {
            margin-left: 10px;
            color: #70757a;
            font-size: 18px;
            line-height: 1;
            align-self: flex-start;
            margin-top: 5px;
        }

        .site-info-wrapper {
            display: flex;
        }
    </style>
</head>

<body>

    <div class="result-container">
        <div class="site-info-wrapper">
            <div class="site-info">
                <div class="icon">
                    <img src="public/favicon.png" alt="Roderic Navarro"
                        style="width: 24px; height: 24px; border-radius: 50%;">
                </div>
                <div class="site-name-url">
                    <span class="site-name">Roderic Navarro</span>
                    <span class="url">https://rodskidimitri.github.io › rodericnavarro</span>
                </div>
            </div>
            <div class="options">⋮</div>
        </div>

        <a href="https://rodskidimitri.github.io/rodericnavarro/" class="title">
            Roderic Navarro | AI Consultant in Parañaque, Metro Manila
        </a>

        <div class="description">
            Roderic Navarro — <span class="snippet-keyword">AI</span> Technology <span
                class="snippet-keyword">Consultant</span> in <span class="snippet-keyword">Parañaque</span> City, Metro
            Manila, Philippines. Helping SMEs and startups save $50K+ annually through intelligent ...
        </div>
    </div>

</body>

</html>
